m<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>CHINAMIDIA FITNESS</title>

<style>
body {
  margin: 0;

}

}

  color: #00ff88;

<body>

<header>
  <h1>CHINAMIDIA FITNESS</h1>
  <p>Monte seu treino automático</p>
</header>

<div class="container">

  <div class="box">
    <h2>Escolha seu objetivo:</h2>

    <button onclick="gerarTreino('massa')">Ganhar Massa</button>
    <button onclick="gerarTreino('emagrecer')">Emagrecer</button>
  </div>

  <div id="resultado" class="resultado"></div>

</div>

<a class="whatsapp" href="https://wa.me/5563992357389">💬</a>

<script>
function gerarTreino(tipo) {
  let treino = "";

  if (tipo === "massa") {
    treino = `
    <h3>🔥 Treino para Ganho de Massa</h3>
    Peito: Supino 4x10<br>
    Costas: Puxada 4x10<br>
    Perna: Agachamento 4x10<br>
    Bíceps: Rosca 3x12<br>
    Tríceps: Corda 3x12
    `;
  }

  if (tipo === "emagrecer") {
    treino = `
    <h3>🔥 Treino para Emagrecimento</h3>
    Cardio: 20 min corrida<br>
    Circuito: 3x<br>
    Burpee 10x<br>
    Abdominal 15x<br>
    Agachamento 15x
    `;
  }

  document.getElementById("resultado").innerHTML = treino;
}
</script>
